services:
  bank-statement-intelligence:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: bank_statement_intelligence

    ports:
      - "8501:8501"

    env_file:
      - .env

    environment:
      PYTHONUNBUFFERED: "1"

    volumes:
      - ./output:/app/output
      - ./test_inputs:/app/test_inputs

    extra_hosts:
      - "host.docker.internal:host-gateway"

    restart: unless-stopped